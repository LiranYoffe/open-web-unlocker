name: Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if last commit is a version bump
        id: skip
        run: |
          LAST_MSG=$(git log -1 --pretty=%s)
          if [[ "$LAST_MSG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.skip.outputs.skip != 'true'
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        if: steps.skip.outputs.skip != 'true'
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        if: steps.skip.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - name: Bump patch version
        if: steps.skip.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          git add package.json
          git commit -m "v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin main --tags

      - name: Check if version already exists on npm
        if: steps.skip.outputs.skip != 'true'
        id: check
        run: |
          PACKAGE_NAME=$(bun pm pkg get name | tr -d '"')
          PACKAGE_VERSION=$(bun pm pkg get version | tr -d '"')
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Type check
        if: steps.skip.outputs.skip != 'true'
        run: bun run typecheck

      - name: Build
        if: steps.skip.outputs.skip != 'true'
        run: bun run build

      - name: Smoke test CLI
        if: steps.skip.outputs.skip != 'true'
        run: bun run smoke:cli

      - name: Check npm pack output
        if: steps.skip.outputs.skip != 'true'
        run: bun run pack:dry-run

      - name: Publish to npm
        if: steps.skip.outputs.skip != 'true' && steps.check.outputs.exists != 'true'
        run: npm publish --provenance --access public

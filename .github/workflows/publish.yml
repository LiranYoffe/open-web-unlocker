name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure tag matches package version
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(bun pm pkg get version | tr -d '"')
          test "$TAG_VERSION" = "$PACKAGE_VERSION"

      - name: Check if version already exists on npm
        id: check
        run: |
          PACKAGE_NAME=$(bun pm pkg get name | tr -d '"')
          PACKAGE_VERSION=$(bun pm pkg get version | tr -d '"')
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Smoke test CLI
        run: bun run smoke:cli

      - name: Check npm pack output
        run: bun run pack:dry-run

      - name: Publish to npm
        if: steps.check.outputs.exists != 'true'
        run: npm publish --provenance --access public
